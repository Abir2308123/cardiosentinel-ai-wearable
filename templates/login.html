<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioSentinel — Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .error {
            color: #ef4444;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🔐 CardioSentinel Login</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- ✅ FIXED FORM -->
    <form method="POST" action="/login">

        <!-- ✅ IMPORTANT: name="username" -->
        <input type="text" name="username" placeholder="Username" required>

        <!-- password stays same -->
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p style="margin-top:10px;">
        Demo: <b>admin</b> / <b>admin123</b>
    </p>
</div>

</body>
</html>
