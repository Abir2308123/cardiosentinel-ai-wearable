<!DOCTYPE html>
<html>
<head>
<title>CardioSentinel Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Inter;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button {
    width:100%;
    padding:10px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.role {
    display:flex;
    gap:10px;
    margin:10px 0;
}

.role button {
    flex:1;
    background:#334155;
}
</style>
</head>

<body>

<div class="card">
    <h2>🚀 CardioSentinel</h2>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/login">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <div class="role">
            <button type="submit" name="role" value="patient">Patient</button>
            <button type="submit" name="role" value="caretaker">Caretaker</button>
        </div>
    </form>

    <p>Demo: admin / admin123</p>
</div>

</body>
</html>
