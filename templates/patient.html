<!DOCTYPE html>
<html>
<head>
<title>Patient Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Inter;
    margin:0;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#020617;
}

.logout {
    background:#ef4444;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.container {
    padding:20px;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
}

.chart-row {
    display:flex;
    gap:20px;
}

.map-card {
    height:300px;
}

#map {
    height:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
    <h2>🩺 Patient Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
    ❤️ Heart Rate: <span id="hr">--</span>
</div>

<div class="card">
    🫁 SpO2: <span id="spo2">--</span>
</div>

<div class="card">
    📉 G-Force: <span id="g">--</span>
</div>

<!-- 🔥 CHARTS -->
<div class="chart-row">

    <div class="card">
        <h3>❤️ Heart Rate</h3>
        <canvas id="hrChart"></canvas>
    </div>

    <div class="card">
        <h3>🫁 SpO2</h3>
        <canvas id="spo2Chart"></canvas>
    </div>

</div>

<!-- 🔥 MAP -->
<div class="card map-card">
    <h3>🗺️ Live Location</h3>
    <div id="map"></div>
</div>

</div>

<script>
let labels = [];
let hrData = [];
let spo2Data = [];

/* Charts */
const hrChart = new Chart(document.getElementById("hrChart"), {
    type:'line',
    data:{
        labels:labels,
        datasets:[{
            label:'Heart Rate',
            data:hrData,
            borderColor:'#ef4444',
            tension:0.4
        }]
    }
});

const spo2Chart = new Chart(document.getElementById("spo2Chart"), {
    type:'line',
    data:{
        labels:labels,
        datasets:[{
            label:'SpO2',
            data:spo2Data,
            borderColor:'#3b82f6',
            tension:0.4
        }]
    }
});

/* 🔥 MAP SETUP */
let map = L.map('map').setView([20,77],5);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 18
}).addTo(map);

let marker = L.marker([20,77]).addTo(map);

/* 🔄 DATA FETCH */
async function fetchData(){
    let res = await fetch('/latest');
    let d = await res.json();

    document.getElementById("hr").innerText = d.heart_rate;
    document.getElementById("spo2").innerText = d.spo2;
    document.getElementById("g").innerText = d.g_force;

    let time = new Date().toLocaleTimeString();

    labels.push(time);
    hrData.push(d.heart_rate);
    spo2Data.push(d.spo2);

    if(labels.length > 20){
        labels.shift();
        hrData.shift();
        spo2Data.shift();
    }

    hrChart.update();
    spo2Chart.update();

    /* 🔥 UPDATE MAP */
    if(d.latitude && d.longitude && d.latitude != 0){
        marker.setLatLng([d.latitude, d.longitude]);
        map.setView([d.latitude, d.longitude], 16);
    }
}

setInterval(fetchData, 2000);

/* 🔥 LOGOUT */
function logout(){
    window.location.href = "/logout";
}
</script>

</body>
</html>
